<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 MORIVA 마진 계산기</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #F7F4EC; overflow-x: hidden; }
    #root { min-height: 100vh; }
    select { -webkit-appearance: none; }
    button { font-family: 'Noto Sans KR', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #EFEAE0; }
    ::-webkit-scrollbar-thumb { background: #E5DFCF; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // ── CONSTANTS ─────────────────────────────────────────────────────────────
    const CATS = [
      { label: "생활/주방",    fee: 11   },
      { label: "뷰티/코스메틱", fee: 11.5 },
      { label: "패션/의류",    fee: 14   },
      { label: "패션잡화",     fee: 12   },
      { label: "스포츠/레저",  fee: 11   },
      { label: "가전/디지털",  fee: 10.8 },
      { label: "식품/건강",    fee: 10.8 },
      { label: "반려동물",     fee: 11   },
      { label: "완구/취미",    fee: 11   },
      { label: "유아동",       fee: 11.5 },
      { label: "직접입력",     fee: null },
    ];
    const RKTS = [
      { label: "극소형 (50g 이하)",  fee: 1800 },
      { label: "소형 (2kg 이하)",    fee: 2500 },
      { label: "중형 (5kg 이하)",    fee: 3500 },
      { label: "대형 (10kg 이하)",   fee: 5000 },
      { label: "특대형 (10kg 초과)", fee: 7500 },
      { label: "직접입력",           fee: null  },
    ];

    // ── HELPERS ───────────────────────────────────────────────────────────────
    const nv  = v => parseFloat(String(v).replace(/,/g, "")) || 0;
    const fmt = n => Math.round(n).toLocaleString("ko-KR");
    const fp  = (n, d = 1) => Number(n).toFixed(d);
    const mc  = r => r >= 20 ? "#4ADE80" : r >= 10 ? "#FACC15" : r >= 0 ? "#FB923C" : "#F87171";

    const INPUT_STYLE = {
      width: "100%", padding: "8px 10px", borderRadius: 6, outline: "none",
      background: "#FBFAF6", border: "1px solid #E3DDCB", color: "#1E293B",
      fontSize: 14, fontFamily: "JetBrains Mono, monospace",
    };
    const SELECT_STYLE = {
      width: "100%", padding: "8px 10px", background: "#FBFAF6",
      border: "1px solid #E3DDCB", borderRadius: 6, color: "#1E293B",
      fontSize: 13, marginBottom: 8, cursor: "pointer", outline: "none",
    };

    // ── UI COMPONENTS (App 바깥에 정의 — 리렌더링 시 재생성 방지) ─────────────

    function SL({ text }) {
      return (
        <div style={{ fontSize: 10, color: "#64748B", marginBottom: 4,
          letterSpacing: "0.07em", textTransform: "uppercase", fontWeight: 700 }}>
          {text}
        </div>
      );
    }

    function NumIn({ label, unit, value, onChange, placeholder }) {
      return (
        <div style={{ marginBottom: 12 }}>
          <SL text={label + (unit ? ` (${unit})` : "")} />
          <input
            type="text"
            inputMode="decimal"
            value={value}
            onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            style={INPUT_STYLE}
          />
        </div>
      );
    }

    function TextIn({ label, value, onChange, placeholder, mono }) {
      return (
        <div style={{ marginBottom: 12 }}>
          {label && <SL text={label} />}
          <input
            type="text"
            value={value}
            onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            style={{ ...INPUT_STYLE,
              fontFamily: mono ? "JetBrains Mono, monospace" : "'Noto Sans KR', sans-serif",
              fontSize: mono ? 11 : 13 }}
          />
        </div>
      );
    }

    function Seg({ options, current, onChange }) {
      return (
        <div style={{ display: "flex", background: "#EFEAE0", borderRadius: 8,
          padding: 3, border: "1px solid #E3DDCB", marginBottom: 12 }}>
          {options.map(o => (
            <button key={o.v} onClick={() => onChange(o.v)}
              style={{ flex: 1, padding: "7px 4px", borderRadius: 6, border: "none",
                cursor: "pointer", transition: "all .15s",
                background: current === o.v ? "#EE4D2D" : "transparent",
                color: current === o.v ? "#fff" : "#475569",
                fontSize: 12, fontWeight: 700 }}>
              {o.l}
            </button>
          ))}
        </div>
      );
    }

    function Toggle({ label, value, onChange }) {
      return (
        <div style={{ display: "flex", alignItems: "center",
          justifyContent: "space-between", marginBottom: 12 }}>
          <span style={{ fontSize: 13, color: "#94A3B8" }}>{label}</span>
          <button onClick={() => onChange(!value)}
            style={{ width: 44, height: 24, borderRadius: 12, border: "none",
              cursor: "pointer", background: value ? "#EE4D2D" : "#E3DDCB",
              position: "relative", transition: "background .2s" }}>
            <span style={{ position: "absolute", top: 3, width: 18, height: 18,
              left: value ? 23 : 3, borderRadius: "50%", background: "#fff",
              boxShadow: "0 1px 3px rgba(0,0,0,0.25)",
              transition: "left .2s", display: "block" }} />
          </button>
        </div>
      );
    }

    function CostRow({ label, value, accent, bold }) {
      return (
        <div style={{ display: "flex", justifyContent: "space-between",
          padding: "5px 0", borderBottom: "1px solid #F1ECE0" }}>
          <span style={{ fontSize: 12, color: bold ? "#1E293B" : "#475569",
            fontWeight: bold ? 700 : 400 }}>{label}</span>
          <span style={{ fontSize: 12, fontFamily: "JetBrains Mono, monospace",
            color: accent || (bold ? "#94A3B8" : "#334155"),
            fontWeight: bold ? 700 : 400 }}>
            {fmt(value)}원
          </span>
        </div>
      );
    }

    function Card({ children, style: extra = {} }) {
      return (
        <div style={{ background: "#FFFFFF", borderRadius: 12,
          padding: "16px 18px", border: "1px solid #E5DFCF",
          boxShadow: "0 1px 3px rgba(20,20,10,0.04)",
          marginBottom: 14, ...extra }}>
          {children}
        </div>
      );
    }

    function PH({ children }) {
      return (
        <div style={{ fontSize: 10, color: "#475569", fontWeight: 700,
          textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 12 }}>
          {children}
        </div>
      );
    }

    function Sec({ emoji, title, children }) {
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8,
            paddingBottom: 8, marginBottom: 12, borderBottom: "1px solid #E5DFCF" }}>
            <span style={{ fontSize: 14 }}>{emoji}</span>
            <span style={{ fontSize: 10, fontWeight: 700, color: "#334155",
              textTransform: "uppercase", letterSpacing: "0.1em" }}>{title}</span>
          </div>
          {children}
        </div>
      );
    }

    // ── MAIN APP ──────────────────────────────────────────────────────────────
    function App() {
      const [sp,    setSp   ] = useState("");
      const [ch,    setCh   ] = useState("rocket");
      const [ci,    setCi   ] = useState(0);
      const [ccf,   setCcf  ] = useState("11");
      const [cur,   setCur  ] = useState("CNY");
      const [bp,    setBp   ] = useState("");
      const [xrMode, setXrMode] = useState("manual"); // "manual" 수기입력 | "simple" 간편비율
      const [simRate, setSimRate] = useState("300");
      const [xrCny, setXrCny] = useState("227");
      const [xrUsd, setXrUsd] = useState("1535");
      const [cr,    setCr   ] = useState("8");
      const [vat,   setVat  ] = useState(true);
      const [fw,    setFw   ] = useState("2000");
      const [cl,    setCl   ] = useState("1000");
      const [ri,    setRi   ] = useState(1);
      const [crf,   setCrf  ] = useState("2500");
      const [promo, setPromo] = useState("none"); // "none" | "90" | "270" (로켓그로스 비용 제로 프로모션)
      const [ms,    setMs   ] = useState("3000");
      const [ar,    setAr   ] = useState("7");
      const [rr,    setRr   ] = useState("3");
      const [tm,    setTm   ] = useState("30");

      // ── 상품 정보 ──
      const [pName,    setPName   ] = useState("");
      const [url1688,  setUrl1688 ] = useState("");
      const [imgUrl,   setImgUrl  ] = useState("");
      const [mCat,     setMCat    ] = useState("ACTIVE");
      const [pMemo,    setPMemo   ] = useState("");
      const [options,  setOptions ] = useState([]); // [{name, bp, sp}]
      const [activeOpt,setActiveOpt] = useState(null);
      // ── UI 상태 ──
      const [showSaved,  setShowSaved ] = useState(false);
      const [filterCat,  setFilterCat ] = useState("ALL");
      const [copiedLink, setCopiedLink] = useState(false);
      const [savedList,  setSavedList ] = useState(() => {
        try { return JSON.parse(localStorage.getItem("moriva_margin_v1") || "[]"); } catch { return []; }
      });

      // ── GitHub 동기화 상태 ──
      const [ghToken,      setGhToken     ] = useState(() => localStorage.getItem("moriva_gh_token") || "");
      const [ghRepo,       setGhRepo      ] = useState(() => localStorage.getItem("moriva_gh_repo") || "");
      const [ghPath,       setGhPath      ] = useState(() => localStorage.getItem("moriva_gh_path") || "moriva_margin_data.json");
      const [ghSha,        setGhSha       ] = useState(null);
      const [syncStatus,   setSyncStatus  ] = useState("idle"); // idle | loading | success | error | notfound
      const [showGhPanel,  setShowGhPanel ] = useState(false);
      const didInitPull    = useRef(false);
      const ghConfigured   = ghToken.trim() !== "" && ghRepo.trim() !== "";

      const simpleMode = cur !== "KRW" && xrMode === "simple";

      // ── SAVE / LOAD ──────────────────────────────────────────────────────────
      const MCAT_COLORS = {
        ACTIVE:"#EE4D2D", CAMP:"#16A34A", HOME:"#2563EB", PET:"#9333EA", BAG:"#CA8A04"
      };

      // 옵션 헬퍼
      const addOpt = () => setOptions(prev => [...prev, { name: "", bp, sp }]);
      const updateOpt = (i, key, val) =>
        setOptions(prev => prev.map((o, j) => j === i ? { ...o, [key]: val } : o));
      const removeOpt = (i) => {
        setOptions(prev => prev.filter((_, j) => j !== i));
        if (activeOpt === i) setActiveOpt(null);
      };
      const applyOpt = (i) => {
        const opt = options[i];
        if (opt.bp) setBp(opt.bp);
        if (opt.sp) setSp(opt.sp);
        setActiveOpt(i);
      };

      // 옵션별 마진율 계산 (저장 시 사용)
      const calcOptMargin = (opt) => {
        const SP = nv(opt.sp); if (!SP) return null;
        const effR = xrMode === "simple" ? nv(simRate) : cur === "CNY" ? nv(xrCny) : nv(xrUsd);
        const bk = cur === "KRW" ? nv(opt.bp) : nv(opt.bp) * effR;
        const cst = simpleMode ? 0 : bk * (nv(cr) / 100);
        const vt  = simpleMode ? 0 : (vat ? (bk + cst) * 0.1 : 0);
        const fwA = simpleMode ? 0 : nv(fw);
        const clA = simpleMode ? 0 : nv(cl);
        const imp = bk + cst + vt + fwA + clA;
        const catF = CATS[ci].fee !== null ? CATS[ci].fee : nv(ccf);
        const log  = (ch === "rocket" && promo === "90") ? 0
          : ch === "rocket" ? (RKTS[ri].fee !== null ? RKTS[ri].fee : nv(crf)) : nv(ms);
        const pA = ch === "rocket" && promo !== "none";
        const tot = imp + SP*(catF/100) + log + SP*(nv(ar)/100) + (pA ? 0 : SP*(nv(rr)/100)*0.3);
        return ((SP - tot) / SP * 100).toFixed(1);
      };

      const collectState = () => ({
        pName, url1688, imgUrl, mCat, pMemo, options,
        sp, ch, ci: String(ci), ccf, cur, bp,
        xrMode, simRate, xrCny, xrUsd,
        cr, vat: vat ? "1" : "0", fw, cl,
        ri: String(ri), crf, promo, ms, ar, rr, tm
      });
      const restoreState = (s) => {
        if (s.pName   !== undefined) setPName(s.pName);
        if (s.url1688 !== undefined) setUrl1688(s.url1688);
        if (s.imgUrl  !== undefined) setImgUrl(s.imgUrl);
        if (s.mCat    !== undefined) setMCat(s.mCat);
        if (s.pMemo   !== undefined) setPMemo(s.pMemo);
        if (s.options !== undefined) { setOptions(s.options); setActiveOpt(null); }
        if (s.sp      !== undefined) setSp(s.sp);
        if (s.ch      !== undefined) setCh(s.ch);
        if (s.ci      !== undefined) setCi(Number(s.ci));
        if (s.ccf     !== undefined) setCcf(s.ccf);
        if (s.cur     !== undefined) setCur(s.cur);
        if (s.bp      !== undefined) setBp(s.bp);
        if (s.xrMode  !== undefined) setXrMode(s.xrMode);
        if (s.simRate  !== undefined) setSimRate(s.simRate);
        if (s.xrCny   !== undefined) setXrCny(s.xrCny);
        if (s.xrUsd   !== undefined) setXrUsd(s.xrUsd);
        if (s.cr      !== undefined) setCr(s.cr);
        if (s.vat     !== undefined) setVat(s.vat === "1" || s.vat === true);
        if (s.fw      !== undefined) setFw(s.fw);
        if (s.cl      !== undefined) setCl(s.cl);
        if (s.ri      !== undefined) setRi(Number(s.ri));
        if (s.crf     !== undefined) setCrf(s.crf);
        if (s.promo   !== undefined) setPromo(s.promo);
        if (s.ms      !== undefined) setMs(s.ms);
        if (s.ar      !== undefined) setAr(s.ar);
        if (s.rr      !== undefined) setRr(s.rr);
        if (s.tm      !== undefined) setTm(s.tm);
      };
      const persist = (list, skipGh = false) => {
        setSavedList(list);
        localStorage.setItem("moriva_margin_v1", JSON.stringify(list));
        if (!skipGh && ghConfigured) pushToGitHub(list);
      };

      // ── GitHub API ────────────────────────────────────────────────────────────
      const ghApiUrl = () =>
        `https://api.github.com/repos/${ghRepo.trim()}/contents/${ghPath.trim()}`;
      const ghHeaders = () => ({
        "Authorization": `Bearer ${ghToken.trim()}`,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json",
        "X-GitHub-Api-Version": "2022-11-28"
      });

      const pullFromGitHub = async () => {
        if (!ghConfigured) return;
        setSyncStatus("loading");
        try {
          const res = await fetch(ghApiUrl(), { headers: ghHeaders() });
          if (res.status === 404) { setSyncStatus("notfound"); return; }
          if (!res.ok) throw new Error(res.status);
          const data = await res.json();
          setGhSha(data.sha);
          const parsed = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g, "")))));
          if (Array.isArray(parsed)) {
            // 병합: savedAt 기준 중복 제거 후 최신 100개 유지
            const merged = Object.values(
              [...parsed, ...JSON.parse(localStorage.getItem("moriva_margin_v1") || "[]")]
                .reduce((acc, it) => { acc[it.savedAt] = it; return acc; }, {})
            ).sort((a, b) => b.savedAt - a.savedAt).slice(0, 100);
            setSavedList(merged);
            localStorage.setItem("moriva_margin_v1", JSON.stringify(merged));
          }
          setSyncStatus("success");
        } catch (e) {
          console.error("GitHub pull error:", e);
          setSyncStatus("error");
        }
      };

      const pushToGitHub = async (list) => {
        if (!ghConfigured) return;
        setSyncStatus("loading");
        try {
          // SHA 없으면 먼저 확인
          let sha = ghSha;
          if (!sha) {
            const check = await fetch(ghApiUrl(), { headers: ghHeaders() });
            if (check.ok) { const d = await check.json(); sha = d.sha; setGhSha(d.sha); }
          }
          const content = btoa(unescape(encodeURIComponent(JSON.stringify(list, null, 2))));
          const body = {
            message: `MORIVA 마진 데이터 업데이트 · ${new Date().toLocaleString("ko-KR")}`,
            content,
            ...(sha ? { sha } : {})
          };
          const res = await fetch(ghApiUrl(), {
            method: "PUT", headers: ghHeaders(), body: JSON.stringify(body)
          });
          if (!res.ok) throw new Error(res.status);
          const result = await res.json();
          setGhSha(result.content.sha);
          setSyncStatus("success");
        } catch (e) {
          console.error("GitHub push error:", e);
          setSyncStatus("error");
        }
      };

      // 앱 시작 시 GitHub에서 자동 pull
      useEffect(() => {
        if (!didInitPull.current && ghConfigured) {
          didInitPull.current = true;
          pullFromGitHub();
        }
      }, [ghConfigured]);
      const saveItem = () => {
        const optsWithMargin = options.map(o => ({ ...o, _marginRate: calcOptMargin(o) }));
        const item = {
          ...collectState(), options: optsWithMargin,
          savedAt: Date.now(), _marginRate: C.marginRate.toFixed(1)
        };
        persist([item, ...savedList].slice(0, 100));
      };
      const loadItem = (item) => { restoreState(item); setShowSaved(false); };
      const deleteItem = (idx, e) => { e.stopPropagation(); persist(savedList.filter((_, i) => i !== idx)); };
      const shareUrl = () => {
        try {
          const enc = btoa(unescape(encodeURIComponent(JSON.stringify(collectState()))));
          navigator.clipboard.writeText(location.origin + location.pathname + "#" + enc);
          setCopiedLink(true); setTimeout(() => setCopiedLink(false), 2200);
        } catch {}
      };
      // URL hash 복원 (공유 링크)
      useEffect(() => {
        const hash = location.hash.slice(1);
        if (!hash) return;
        try { restoreState(JSON.parse(decodeURIComponent(escape(atob(hash))))); } catch {}
      }, []);

      const C = useMemo(() => {
        const SP = nv(sp);
        const effRate =
          xrMode === "simple" ? nv(simRate)
          : cur === "CNY" ? nv(xrCny) : nv(xrUsd);
        const buyKrw =
          cur === "KRW" ? nv(bp) : nv(bp) * effRate;
        // 간편비율(₩300)에는 관세·부가세·국제배송비·통관비가 이미 버퍼로 포함되어 있으므로
        // 간편비율 적용 시 해당 항목들은 중복 계산하지 않고 0으로 처리한다.
        const customs   = simpleMode ? 0 : buyKrw * (nv(cr) / 100);
        const vatAmt    = simpleMode ? 0 : (vat ? (buyKrw + customs) * 0.1 : 0);
        const fwAmt     = simpleMode ? 0 : nv(fw);
        const clAmt     = simpleMode ? 0 : nv(cl);
        const impTotal  = buyKrw + customs + vatAmt + fwAmt + clAmt;
        const catFee    = CATS[ci].fee !== null ? CATS[ci].fee : nv(ccf);
        const promoActive = ch === "rocket" && promo !== "none";
        const baseLogistic = ch === "rocket"
          ? (RKTS[ri].fee !== null ? RKTS[ri].fee : nv(crf))
          : nv(ms);
        // 로켓그로스 비용 제로 프로모션: 첫 90일은 입출고비+배송비(물류비)와 반품비 전액 무료,
        // 이후 추가 270일(로켓그로스 세이버 자동적용)은 반품비만 계속 무료 (물류비는 정상 부과)
        const logistic  = (ch === "rocket" && promo === "90") ? 0 : baseLogistic;
        const commission = SP * (catFee / 100);
        const adCost    = SP * (nv(ar) / 100);
        const retCost   = promoActive ? 0 : SP * (nv(rr) / 100) * 0.3;
        const sellTotal = commission + logistic + adCost + retCost;
        const totalCost = impTotal + sellTotal;
        const margin    = SP - totalCost;
        const marginRate = SP > 0 ? (margin / SP) * 100 : 0;
        const varRate   = catFee / 100 + nv(ar) / 100 + (promoActive ? 0 : (nv(rr) / 100) * 0.3);
        const fixedC    = impTotal + logistic;
        const bepPrice  = varRate < 1 ? fixedC / (1 - varRate) : 0;
        const minPrice  = (varRate + nv(tm) / 100) < 1
          ? fixedC / (1 - varRate - nv(tm) / 100) : 0;
        return {
          SP, buyKrw, customs, vatAmt, fwAmt, clAmt, impTotal,
          catFee, commission, logistic, adCost, retCost, sellTotal,
          totalCost, margin, marginRate, bepPrice, minPrice, effRate, promoActive,
        };
      }, [sp, ch, ci, ccf, cur, bp, xrMode, simRate, xrCny, xrUsd, simpleMode, cr, vat, fw, cl, ri, crf, promo, ms, ar, rr, tm]);

      const BARS = [
        { label: "수입원가", color: "#3B82F6", val: C.impTotal    },
        { label: "수수료",   color: "#EE4D2D", val: C.commission  },
        { label: "물류비",   color: "#F59E0B", val: C.logistic    },
        { label: "광고비",   color: "#8B5CF6", val: C.adCost      },
        { label: "반품비",   color: "#EC4899", val: C.retCost     },
        { label: "이익",     color: mc(C.marginRate), val: Math.max(C.margin, 0) },

                          )}
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                              <div style={{ fontWeight: 700, fontSize: 13, color: "#1E293B",
                                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                                flex: 1, marginRight: 8 }}>
                                {item.pName || <span style={{ color: "#94A3B8" }}>(상품명 없음)</span>}
                              </div>
                              <button onClick={(e) => deleteItem(idx, e)}
                                style={{ background: "none", border: "none", color: "#CBD5E1",
                                  cursor: "pointer", fontSize: 16, padding: "0", lineHeight: 1, flexShrink: 0 }}>✕</button>
                            </div>
                            <div style={{ display: "flex", gap: 5, marginTop: 6, flexWrap: "wrap" }}>
                              {item.mCat && (
                                <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 12,
                                  background: MCAT_COLORS[item.mCat] || "#10192B",
                                  color: "#fff", fontWeight: 700 }}>{item.mCat}</span>
                              )}
                              <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 12,
                                background: mc(mr) + "18", color: mc(mr), fontWeight: 700,
                                border: "1px solid " + mc(mr) + "40" }}>
                                마진 {item._marginRate}%
                              </span>
                              {item.ch === "rocket" && (
                                <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 12,
                                  background: "#EFF6FF", color: "#3B82F6", fontWeight: 700 }}>🚀 로켓</span>
                              )}
                              {item.url1688 && (
                                <span onClick={e => { e.stopPropagation(); window.open(item.url1688,"_blank"); }}
                                  style={{ fontSize: 10, padding: "2px 8px", borderRadius: 12,
                                    background: "#FFF3E0", color: "#EA6000", fontWeight: 700, cursor: "pointer" }}>
                                  1688 🔗
                                </span>
                              )}
                            </div>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 2, marginTop: 7 }}>
                              <div style={{ fontSize: 11, color: "#64748B" }}>
                                판매가 <span style={{ color: "#1E293B", fontFamily: "JetBrains Mono, monospace",
                                  fontWeight: 600 }}>₩{fmt(nv(item.sp))}</span>
                              </div>
                              <div style={{ fontSize: 11, color: "#64748B" }}>
                                매입가 <span style={{ color: "#1E293B", fontFamily: "JetBrains Mono, monospace",
                                  fontWeight: 600 }}>{item.bp} {item.cur}</span>
                              </div>
                            </div>
                          </div>
                        </div>

                        {/* 옵션 목록 */}
                        {item.options && item.options.length > 0 && (
                          <div style={{ marginTop: 10, borderTop: "1px solid #F1ECE0", paddingTop: 8 }}>
                            <div style={{ fontSize: 10, color: "#94A3B8", fontWeight: 700,
                              marginBottom: 5, textTransform: "uppercase", letterSpacing: "0.06em" }}>
                              옵션 {item.options.length}개
                            </div>
                            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                              {item.options.map((opt, oi) => {
                                const omr = parseFloat(opt._marginRate || 0);
                                return (
                                  <div key={oi} style={{ display: "flex", justifyContent: "space-between",
                                    alignItems: "center", background: "#FBFAF6",
                                    borderRadius: 6, padding: "4px 8px" }}>
                                    <span style={{ fontSize: 11, color: "#334155", fontWeight: 600,
                                      flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                      {opt.name || `옵션 ${oi+1}`}
                                    </span>
                                    <div style={{ display: "flex", gap: 8, flexShrink: 0, marginLeft: 8 }}>
                                      <span style={{ fontSize: 10, color: "#64748B",
                                        fontFamily: "JetBrains Mono, monospace" }}>
                                        ₩{fmt(nv(opt.sp))}
                                      </span>
                                      {opt._marginRate && (
                                        <span style={{ fontSize: 10, fontWeight: 700, color: mc(omr) }}>
                                          {opt._marginRate}%
                                        </span>
                                      )}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}

                        {item.pMemo && (
                          <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 8,
                            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                            {item.pMemo}
                          </div>
                        )}
                        <div style={{ fontSize: 10, color: "#CBD5E1", marginTop: 7 }}>
                          {new Date(item.savedAt).toLocaleDateString("ko-KR",
                            { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" })}
                        </div>
                      </div>
                    );
                  })}
                </div>
                {/* 하단 백업 */}
                <div style={{ padding: "14px 18px", borderTop: "1px solid #E5DFCF",
                  background: "#FBFAF6", display: "flex", gap: 8 }}>
                  <button onClick={() => {
                      const blob = new Blob([JSON.stringify(savedList,null,2)],{type:"application/json"});
                      const a = document.createElement("a");
                      a.href = URL.createObjectURL(blob);
                      a.download = "moriva_margin_backup.json"; a.click();
                    }}
                    style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "1px solid #E5DFCF",
                      background: "#fff", cursor: "pointer", fontWeight: 700, fontSize: 12, color: "#334155" }}>
                    ⬇ JSON 백업
                  </button>
                  <label style={{ flex: 1, display: "block" }}>
                    <div style={{ padding: "8px 0", borderRadius: 8, border: "1px solid #E5DFCF",
                      background: "#fff", cursor: "pointer", fontWeight: 700, fontSize: 12,
                      color: "#334155", textAlign: "center" }}>
                      ⬆ JSON 복원
                    </div>
                    <input type="file" accept=".json" style={{ display: "none" }}
                      onChange={e => {
                        const file = e.target.files[0]; if (!file) return;
                        const reader = new FileReader();
                        reader.onload = ev => {
                          try {
                            const data = JSON.parse(ev.target.result);
                            if (Array.isArray(data)) persist([...data,...savedList].slice(0,100));
                          } catch {}
                        };
                        reader.readAsText(file);
                      }} />
                  </label>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
