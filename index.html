<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 MORIVA 마진 계산기</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #F7F4EC; overflow-x: hidden; }
    #root { min-height: 100vh; }
    select { -webkit-appearance: none; }
    button { font-family: 'Noto Sans KR', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #EFEAE0; }
    ::-webkit-scrollbar-thumb { background: #E5DFCF; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // ── CONSTANTS ─────────────────────────────────────────────────────────────
    const CATS = [
      { label: "생활/주방",    fee: 11   },
      { label: "뷰티/코스메틱", fee: 11.5 },
      { label: "패션/의류",    fee: 14   },
      { label: "패션잡화",     fee: 12   },
      { label: "스포츠/레저",  fee: 11   },
      { label: "가전/디지털",  fee: 10.8 },
      { label: "식품/건강",    fee: 10.8 },
      { label: "반려동물",     fee: 11   },
      { label: "완구/취미",    fee: 11   },
      { label: "유아동",       fee: 11.5 },
      { label: "직접입력",     fee: null },
    ];
    const RKTS = [
      { label: "극소형 (50g 이하)",  fee: 1800 },
      { label: "소형 (2kg 이하)",    fee: 2500 },
      { label: "중형 (5kg 이하)",    fee: 3500 },
      { label: "대형 (10kg 이하)",   fee: 5000 },
      { label: "특대형 (10kg 초과)", fee: 7500 },
      { label: "직접입력",           fee: null  },
    ];

    // ── HELPERS ───────────────────────────────────────────────────────────────
    const nv  = v => parseFloat(String(v).replace(/,/g, "")) || 0;
    const fmt = n => Math.round(n).toLocaleString("ko-KR");
    const fp  = (n, d = 1) => Number(n).toFixed(d);
    const mc  = r => r >= 20 ? "#4ADE80" : r >= 10 ? "#FACC15" : r >= 0 ? "#FB923C" : "#F87171";

    const INPUT_STYLE = {
      width: "100%", padding: "8px 10px", borderRadius: 6, outline: "none",
      background: "#FBFAF6", border: "1px solid #E3DDCB", color: "#1E293B",
      fontSize: 14, fontFamily: "JetBrains Mono, monospace",
    };
    const SELECT_STYLE = {
      width: "100%", padding: "8px 10px", background: "#FBFAF6",
      border: "1px solid #E3DDCB", borderRadius: 6, color: "#1E293B",
      fontSize: 13, marginBottom: 8, cursor: "pointer", outline: "none",
    };

    // ── UI COMPONENTS (App 바깥에 정의 — 리렌더링 시 재생성 방지) ─────────────

    function SL({ text }) {
      return (
        <div style={{ fontSize: 10, color: "#64748B", marginBottom: 4,
          letterSpacing: "0.07em", textTransform: "uppercase", fontWeight: 700 }}>
          {text}
        </div>
      );
    }

    function NumIn({ label, unit, value, onChange, placeholder }) {
      return (
        <div style={{ marginBottom: 12 }}>
          <SL text={label + (unit ? ` (${unit})` : "")} />
          <input
            type="text"
            inputMode="decimal"
            value={value}
            onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            style={INPUT_STYLE}
          />
        </div>
      );
    }

    function Seg({ options, current, onChange }) {
      return (
        <div style={{ display: "flex", background: "#EFEAE0", borderRadius: 8,
          padding: 3, border: "1px solid #E3DDCB", marginBottom: 12 }}>
          {options.map(o => (
            <button key={o.v} onClick={() => onChange(o.v)}
              style={{ flex: 1, padding: "7px 4px", borderRadius: 6, border: "none",
                cursor: "pointer", transition: "all .15s",
                background: current === o.v ? "#EE4D2D" : "transparent",
                color: current === o.v ? "#fff" : "#475569",
                fontSize: 12, fontWeight: 700 }}>
              {o.l}
            </button>
          ))}
        </div>
      );
    }

    function Toggle({ label, value, onChange }) {
      return (
        <div style={{ display: "flex", alignItems: "center",
          justifyContent: "space-between", marginBottom: 12 }}>
          <span style={{ fontSize: 13, color: "#94A3B8" }}>{label}</span>
          <button onClick={() => onChange(!value)}
            style={{ width: 44, height: 24, borderRadius: 12, border: "none",
              cursor: "pointer", background: value ? "#EE4D2D" : "#E3DDCB",
              position: "relative", transition: "background .2s" }}>
            <span style={{ position: "absolute", top: 3, width: 18, height: 18,
              left: value ? 23 : 3, borderRadius: "50%", background: "#fff",
              boxShadow: "0 1px 3px rgba(0,0,0,0.25)",
              transition: "left .2s", display: "block" }} />
          </button>
        </div>
      );
    }

    function CostRow({ label, value, accent, bold }) {
      return (
        <div style={{ display: "flex", justifyContent: "space-between",
          padding: "5px 0", borderBottom: "1px solid #F1ECE0" }}>
          <span style={{ fontSize: 12, color: bold ? "#1E293B" : "#475569",
            fontWeight: bold ? 700 : 400 }}>{label}</span>
          <span style={{ fontSize: 12, fontFamily: "JetBrains Mono, monospace",
            color: accent || (bold ? "#94A3B8" : "#334155"),
            fontWeight: bold ? 700 : 400 }}>
            {fmt(value)}원
          </span>
        </div>
      );
    }

    function Card({ children, style: extra = {} }) {
      return (
        <div style={{ background: "#FFFFFF", borderRadius: 12,
          padding: "16px 18px", border: "1px solid #E5DFCF",
          boxShadow: "0 1px 3px rgba(20,20,10,0.04)",
          marginBottom: 14, ...extra }}>
          {children}
        </div>
      );
    }

    function PH({ children }) {
      return (
        <div style={{ fontSize: 10, color: "#475569", fontWeight: 700,
          textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 12 }}>
          {children}
        </div>
      );
    }

    function Sec({ emoji, title, children }) {
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8,
            paddingBottom: 8, marginBottom: 12, borderBottom: "1px solid #E5DFCF" }}>
            <span style={{ fontSize: 14 }}>{emoji}</span>
            <span style={{ fontSize: 10, fontWeight: 700, color: "#334155",
              textTransform: "uppercase", letterSpacing: "0.1em" }}>{title}</span>
          </div>
          {children}
        </div>
      );
    }

    // ── MAIN APP ──────────────────────────────────────────────────────────────
    function App() {
      const [sp,    setSp   ] = useState("");
      const [ch,    setCh   ] = useState("rocket");
      const [ci,    setCi   ] = useState(0);
      const [ccf,   setCcf  ] = useState("11");
      const [cur,   setCur  ] = useState("CNY");
      const [bp,    setBp   ] = useState("");
      const [xrMode, setXrMode] = useState("manual"); // "manual" 수기입력 | "simple" 간편비율
      const [simRate, setSimRate] = useState("300");
      const [xrCny, setXrCny] = useState("227");
      const [xrUsd, setXrUsd] = useState("1535");
      const [cr,    setCr   ] = useState("8");
      const [vat,   setVat  ] = useState(true);
      const [fw,    setFw   ] = useState("2000");
      const [cl,    setCl   ] = useState("1000");
      const [ri,    setRi   ] = useState(1);
      const [crf,   setCrf  ] = useState("2500");
      const [promo, setPromo] = useState("none"); // "none" | "90" | "270" (로켓그로스 비용 제로 프로모션)
      const [ms,    setMs   ] = useState("3000");
      const [ar,    setAr   ] = useState("7");
      const [rr,    setRr   ] = useState("3");
      const [tm,    setTm   ] = useState("30");

      const simpleMode = cur !== "KRW" && xrMode === "simple";

      const C = useMemo(() => {
        const SP = nv(sp);
        const effRate =
          xrMode === "simple" ? nv(simRate)
          : cur === "CNY" ? nv(xrCny) : nv(xrUsd);
        const buyKrw =
          cur === "KRW" ? nv(bp) : nv(bp) * effRate;
        // 간편비율(₩300)에는 관세·부가세·국제배송비·통관비가 이미 버퍼로 포함되어 있으므로
        // 간편비율 적용 시 해당 항목들은 중복 계산하지 않고 0으로 처리한다.
        const customs   = simpleMode ? 0 : buyKrw * (nv(cr) / 100);
        const vatAmt    = simpleMode ? 0 : (vat ? (buyKrw + customs) * 0.1 : 0);
        const fwAmt     = simpleMode ? 0 : nv(fw);
        const clAmt     = simpleMode ? 0 : nv(cl);
        const impTotal  = buyKrw + customs + vatAmt + fwAmt + clAmt;
        const catFee    = CATS[ci].fee !== null ? CATS[ci].fee : nv(ccf);
        const promoActive = ch === "rocket" && promo !== "none";
        const baseLogistic = ch === "rocket"
          ? (RKTS[ri].fee !== null ? RKTS[ri].fee : nv(crf))
          : nv(ms);
        // 로켓그로스 비용 제로 프로모션: 첫 90일은 입출고비+배송비(물류비)와 반품비 전액 무료,
        // 이후 추가 270일(로켓그로스 세이버 자동적용)은 반품비만 계속 무료 (물류비는 정상 부과)
        const logistic  = (ch === "rocket" && promo === "90") ? 0 : baseLogistic;
        const commission = SP * (catFee / 100);
        const adCost    = SP * (nv(ar) / 100);
        const retCost   = promoActive ? 0 : SP * (nv(rr) / 100) * 0.3;
        const sellTotal = commission + logistic + adCost + retCost;
        const totalCost = impTotal + sellTotal;
        const margin    = SP - totalCost;
        const marginRate = SP > 0 ? (margin / SP) * 100 : 0;
        const varRate   = catFee / 100 + nv(ar) / 100 + (promoActive ? 0 : (nv(rr) / 100) * 0.3);
        const fixedC    = impTotal + logistic;
        const bepPrice  = varRate < 1 ? fixedC / (1 - varRate) : 0;
        const minPrice  = (varRate + nv(tm) / 100) < 1
          ? fixedC / (1 - varRate - nv(tm) / 100) : 0;
        return {
          SP, buyKrw, customs, vatAmt, fwAmt, clAmt, impTotal,
          catFee, commission, logistic, adCost, retCost, sellTotal,
          totalCost, margin, marginRate, bepPrice, minPrice, effRate, promoActive,
        };
      }, [sp, ch, ci, ccf, cur, bp, xrMode, simRate, xrCny, xrUsd, simpleMode, cr, vat, fw, cl, ri, crf, promo, ms, ar, rr, tm]);

      const BARS = [
        { label: "수입원가", color: "#3B82F6", val: C.impTotal    },
        { label: "수수료",   color: "#EE4D2D", val: C.commission  },
        { label: "물류비",   color: "#F59E0B", val: C.logistic    },
        { label: "광고비",   color: "#8B5CF6", val: C.adCost      },
        { label: "반품비",   color: "#EC4899", val: C.retCost     },
        { label: "이익",     color: mc(C.marginRate), val: Math.max(C.margin, 0) },
      ];

      return (
        <div style={{ minHeight: "100vh", background: "#F7F4EC",
          color: "#1E293B", fontFamily: "'Noto Sans KR', sans-serif", padding: 20 }}>

          {/* MORIVA BRAND HEADER */}
          <div style={{ maxWidth: 1080, margin: "0 auto 20px", borderRadius: 14,
            overflow: "hidden", border: "1px solid #E5DFCF",
            boxShadow: "0 2px 8px rgba(20,20,10,0.06)" }}>
            <div style={{ background: "#10192B", padding: "18px 28px", textAlign: "center" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                <span style={{ fontSize: 22, fontWeight: 900, color: "#fff",
                  letterSpacing: "-0.04em" }}>M</span>
                <span style={{ fontSize: 20, fontWeight: 900, color: "#fff",
                  letterSpacing: "0.06em" }}>MORIVA</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: "#7C8AA5", marginLeft: 4 }}>모리바</span>
              </div>
              <div style={{ fontSize: 10, color: "#7C8AA5", marginTop: 6,
                letterSpacing: "0.16em", textTransform: "uppercase" }}>
                Better Life, Better Move
              </div>
            </div>
            <div style={{ background: "#FBFAF6", padding: "12px 28px",
              display: "flex", justifyContent: "center", gap: 32, flexWrap: "wrap" }}>
              {[
                { e: "🏃", k: "ACTIVE", h: "액티브" },
                { e: "⛺", k: "CAMP",   h: "캠프"   },
                { e: "🏠", k: "HOME",   h: "홈"     },
                { e: "🐾", k: "PET",    h: "펫"     },
                { e: "👜", k: "BAG",    h: "백"     },
              ].map((c, i) => (
                <div key={i} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 15 }}>{c.e}</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#1E293B", marginTop: 3 }}>{c.k}</div>
                  <div style={{ fontSize: 9, color: "#94A3B8" }}>{c.h}</div>
                </div>
              ))}
            </div>
          </div>

          {/* HEADER */}
          <div style={{ maxWidth: 1080, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center" }}>
              <div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
                  <span style={{ fontSize: 20, fontWeight: 900, color: "#EE4D2D",
                    letterSpacing: "-0.02em" }}>COUPANG</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "#8C8472",
                    letterSpacing: "0.14em", textTransform: "uppercase" }}>
                    Gross Margin Calculator
                  </span>
                </div>
                <div style={{ fontSize: 11, color: "#8C8472", marginTop: 2 }}>
                  중국 직소싱 상품 수익성 분석 · 수입원가 + 관부가세 + 판매비 자동 계산
                </div>
              </div>
              <div style={{ marginLeft: "auto" }}>
                <div style={{ padding: "6px 16px", borderRadius: 8,
                  background: mc(C.marginRate) + "12",
                  border: "1px solid " + mc(C.marginRate) + "30" }}>
                  <span style={{ fontSize: 24, fontFamily: "JetBrains Mono, monospace",
                    fontWeight: 900, color: mc(C.marginRate) }}>
                    {fp(C.marginRate)}%
                  </span>
                  <span style={{ fontSize: 12, color: mc(C.marginRate),
                    opacity: 0.7, marginLeft: 6 }}>마진율</span>
                </div>
              </div>
            </div>
            <div style={{ height: 1, marginTop: 12,
              background: "linear-gradient(90deg,#EE4D2D55,#EE4D2D18,transparent)" }} />
          </div>

          {/* MAIN GRID */}
          <div style={{ maxWidth: 1080, margin: "0 auto", display: "grid",
            gridTemplateColumns: "370px 1fr", gap: 16, alignItems: "start" }}>

            {/* ──── LEFT: INPUTS ──── */}
            <div style={{ paddingRight: 2 }}>

              <Card>
                <Sec emoji="📦" title="판매 정보">
                  <NumIn label="판매가" unit="KRW" value={sp} onChange={setSp} placeholder="예: 29800" />
                  <SL text="판매 채널" />
                  <Seg
                    options={[{ v: "rocket", l: "🚀 로켓그로스" }, { v: "market", l: "🏪 마켓플레이스" }]}
                    current={ch} onChange={setCh}
                  />
                  <SL text="카테고리" />
                  <select value={ci} onChange={e => setCi(Number(e.target.value))} style={SELECT_STYLE}>
                    {CATS.map((c, i) => (
                      <option key={i} value={i}>{c.label}{c.fee !== null ? ` — ${c.fee}%` : " — 직접입력"}</option>
                    ))}
                  </select>
                  {CATS[ci].fee === null && (
                    <NumIn label="카테고리 수수료율" unit="%" value={ccf} onChange={setCcf} />
                  )}
                </Sec>
              </Card>

              <Card>
                <Sec emoji="💴" title="중국 사입 원가">
                  <SL text="결제 통화" />
                  <Seg
                    options={[{ v: "CNY", l: "위안 CNY" }, { v: "USD", l: "달러 USD" }, { v: "KRW", l: "원 KRW" }]}
                    current={cur} onChange={setCur}
                  />
                  <NumIn label="매입가" unit={cur} value={bp} onChange={setBp} placeholder="예: 15" />
                  {cur !== "KRW" && (
                    <React.Fragment>
                      <SL text="환율 적용 방식" />
                      <Seg
                        options={[{ v: "manual", l: "수기 입력" }, { v: "simple", l: "간편비율" }]}
                        current={xrMode} onChange={setXrMode}
                      />
                      {xrMode === "manual" ? (
                        cur === "CNY"
                          ? <NumIn label="CNY → KRW 환율 (오늘 기준)" unit="₩/¥" value={xrCny} onChange={setXrCny} />
                          : <NumIn label="USD → KRW 환율 (오늘 기준)" unit="₩/$" value={xrUsd} onChange={setXrUsd} />
                      ) : (
                        <React.Fragment>
                          <div style={{ fontSize: 10, color: "#475569", marginBottom: 8 }}>
                            관부가세·운송비 등 버퍼 포함 추정 — 기본 ₩300, 직접 수정 가능
                          </div>
                          <NumIn label="간편비율" unit={`₩/${cur === "CNY" ? "¥" : "$"}`}
                            value={simRate} onChange={setSimRate} />
                        </React.Fragment>
                      )}
                    </React.Fragment>
                  )}
                  <div style={{ display: "flex", justifyContent: "space-between",
                    padding: "8px 10px", background: "#EFEAE0", borderRadius: 6,
                    border: "1px solid #E5DFCF", marginTop: 4 }}>
                    <span style={{ fontSize: 11, color: "#475569" }}>매입원가 KRW 환산</span>
                    <span style={{ fontSize: 13, fontFamily: "JetBrains Mono, monospace",
                      color: "#60A5FA", fontWeight: 700 }}>{fmt(C.buyKrw)}원</span>
                  </div>
                </Sec>
              </Card>

              <Card style={simpleMode ? { opacity: 0.5 } : {}}>
                <Sec emoji="🛃" title="수입 비용">
                  {simpleMode && (
                    <div style={{ fontSize: 11, color: "#92650D", background: "#FFF6DE",
                      border: "1px solid #F3E0A8", borderRadius: 6, padding: "8px 10px",
                      marginBottom: 12 }}>
                      간편비율(₩{fmt(nv(simRate))})에 이미 포함되어 있어 비활성화됨
                    </div>
                  )}
                  <div style={{ pointerEvents: simpleMode ? "none" : "auto" }}>
                    <NumIn label="관세율" unit="%" value={cr} onChange={setCr} />
                    <Toggle label="수입부가세 10% 포함" value={vat} onChange={setVat} />
                    <NumIn label="포워딩 / 국제배송비" unit="KRW" value={fw} onChange={setFw} />
                    <NumIn label="통관비" unit="KRW" value={cl} onChange={setCl} />
                  </div>
                </Sec>
              </Card>

              <Card>
                <Sec emoji="🚚" title="판매 / 운영 비용">
                  {ch === "rocket" && (
                    <React.Fragment>
                      <SL text="🎁 로켓그로스 비용 제로 프로모션" />
                      <Seg
                        options={[
                          { v: "none", l: "미적용" },
                          { v: "90",   l: "첫 90일" },
                          { v: "270",  l: "+270일" },
                        ]}
                        current={promo} onChange={setPromo}
                      />
                      {promo === "90" && (
                        <div style={{ fontSize: 11, color: "#1A7A4C", background: "#EAF7EE",
                          border: "1px solid #BFE6CC", borderRadius: 6, padding: "8px 10px",
                          marginBottom: 12 }}>
                          ✅ 첫 90일 혜택 적용 중 — 물류비(입출고/배송) + 반품비 전액 무료<br/>
                          (보관비·반출비도 실제로는 무료지만 이 계산기엔 별도 항목이 없어 미반영)
                        </div>
                      )}
                      {promo === "270" && (
                        <div style={{ fontSize: 11, color: "#1A7A4C", background: "#EAF7EE",
                          border: "1px solid #BFE6CC", borderRadius: 6, padding: "8px 10px",
                          marginBottom: 12 }}>
                          ✅ 추가 270일(로켓그로스 세이버) 적용 중 — 반품비만 계속 무료<br/>
                          물류비는 정상 부과 (보관비는 입고 건당 60일 무료, 이 계산기엔 미반영)
                        </div>
                      )}
                    </React.Fragment>
                  )}
                  {ch === "rocket" ? (
                    <React.Fragment>
                      <SL text="로켓그로스 상품 사이즈" />
                      <select value={ri} onChange={e => setRi(Number(e.target.value))} style={SELECT_STYLE}>
                        {RKTS.map((r, i) => (
                          <option key={i} value={i}>
                            {r.label}{r.fee !== null ? ` — ${r.fee.toLocaleString()}원` : ""}
                          </option>
                        ))}
                      </select>
                      {RKTS[ri].fee === null && (
                        <NumIn label="로켓그로스 물류비" unit="KRW" value={crf} onChange={setCrf} />
                      )}
                      {promo === "90" && (
                        <div style={{ fontSize: 10, color: "#1A7A4C", marginTop: -8, marginBottom: 12 }}>
                          → 프로모션으로 0원 처리됨
                        </div>
                      )}
                    </React.Fragment>
                  ) : (
                    <NumIn label="마켓플레이스 배송비" unit="KRW" value={ms} onChange={setMs} />
                  )}
                  <NumIn label="광고비율" unit="%" value={ar} onChange={setAr} />
                  <NumIn label="예상 반품율" unit="%" value={rr} onChange={setRr} />
                  {C.promoActive && (
                    <div style={{ fontSize: 10, color: "#1A7A4C", marginTop: -8, marginBottom: 12 }}>
                      → 프로모션으로 반품비 0원 처리됨
                    </div>
                  )}
                </Sec>
              </Card>

              <Card>
                <Sec emoji="🎯" title="목표 마진 분석">
                  <NumIn label="목표 마진율" unit="%" value={tm} onChange={setTm} />
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 4 }}>
                    <div style={{ background: "#EFEAE0", borderRadius: 8, padding: 12,
                      border: "1px solid " + (C.SP > 0 && C.SP >= C.bepPrice ? "#16A34A28" : "#7F1D1D28") }}>
                      <div style={{ fontSize: 10, color: "#475569", marginBottom: 6 }}>손익분기가 (BEP)</div>
                      <div style={{ fontSize: 16, fontFamily: "JetBrains Mono, monospace", fontWeight: 700,
                        color: C.SP > 0 && C.SP >= C.bepPrice ? "#4ADE80" : "#F87171" }}>
                        {fmt(C.bepPrice)}원
                      </div>
                      <div style={{ fontSize: 10, marginTop: 4,
                        color: C.SP >= C.bepPrice ? "#16A34A" : "#991B1B" }}>
                        {C.SP > 0 && C.SP >= C.bepPrice ? "✅ 달성" : `❌ ${fmt(C.bepPrice - C.SP)}원 부족`}
                      </div>
                    </div>
                    <div style={{ background: "#EFEAE0", borderRadius: 8, padding: 12,
                      border: "1px solid " + (C.SP > 0 && C.SP >= C.minPrice ? "#1D4ED828" : "#78350F28") }}>
                      <div style={{ fontSize: 10, color: "#475569", marginBottom: 6 }}>
                        목표마진 {fp(nv(tm))}% 최소가
                      </div>
                      <div style={{ fontSize: 16, fontFamily: "JetBrains Mono, monospace", fontWeight: 700,
                        color: C.SP > 0 && C.SP >= C.minPrice ? "#60A5FA" : "#FB923C" }}>
                        {fmt(C.minPrice)}원
                      </div>
                      <div style={{ fontSize: 10, marginTop: 4,
                        color: C.SP >= C.minPrice ? "#1D4ED8" : "#92400E" }}>
                        {C.SP > 0 && C.SP >= C.minPrice ? "✅ 달성" : `❌ ${fmt(C.minPrice - C.SP)}원 부족`}
                      </div>
                    </div>
                  </div>
                </Sec>
              </Card>
            </div>

            {/* ──── RIGHT: RESULTS ──── */}
            <div>
              <Card>
                <PH>예상 마진 분석</PH>
                <div style={{ display: "flex", alignItems: "flex-end",
                  justifyContent: "space-between", marginBottom: 18 }}>
                  <div>
                    <div style={{ fontSize: 80, fontWeight: 900, color: mc(C.marginRate),
                      lineHeight: 1, fontFamily: "JetBrains Mono, monospace", letterSpacing: "-0.04em" }}>
                      {fp(C.marginRate)}%
                    </div>
                    <div style={{ fontSize: 24, fontFamily: "JetBrains Mono, monospace",
                      color: mc(C.marginRate), opacity: 0.75, marginTop: 6 }}>
                      {C.margin >= 0 ? "+" : ""}{fmt(C.margin)}원
                    </div>
                  </div>
                  <div style={{ textAlign: "right", display: "grid", rowGap: 10 }}>
                    <div>
                      <div style={{ fontSize: 10, color: "#8C8472", marginBottom: 2 }}>판매가</div>
                      <div style={{ fontSize: 18, fontFamily: "JetBrains Mono, monospace",
                        color: "#475569" }}>{fmt(C.SP)}원</div>
                    </div>
                    <div>
                      <div style={{ fontSize: 10, color: "#8C8472", marginBottom: 2 }}>총비용</div>
                      <div style={{ fontSize: 18, fontFamily: "JetBrains Mono, monospace",
                        color: "#475569" }}>{fmt(C.totalCost)}원</div>
                    </div>
                  </div>
                </div>
                <div style={{ position: "relative", height: 12, background: "#EFEAE0",
                  borderRadius: 6, overflow: "hidden", border: "1px solid #E5DFCF" }}>
                  <div style={{
                    height: "100%", borderRadius: 6,
                    width: `${Math.min(Math.max(C.marginRate, 0), 50) / 50 * 100}%`,
                    background: `linear-gradient(90deg,${mc(C.marginRate)}70,${mc(C.marginRate)})`,
                    transition: "width .35s ease, background .35s",
                  }} />
                  {[10, 20, 30, 40].map(v => (
                    <div key={v} style={{ position: "absolute", top: 0, bottom: 0,
                      left: `${v / 50 * 100}%`, width: 1, background: "#E5DFCF" }} />
                  ))}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
                  {["0%","10%","20%","30%","40%","50%"].map(v => (
                    <span key={v} style={{ fontSize: 9, color: "#8C8472",
                      fontFamily: "JetBrains Mono, monospace" }}>{v}</span>
                  ))}
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 14 }}>
                  <div style={{ padding: "4px 12px", borderRadius: 100, fontSize: 11, fontWeight: 700,
                    background: mc(C.marginRate) + "15",
                    border: "1px solid " + mc(C.marginRate) + "35",
                    color: mc(C.marginRate) }}>
                    {C.marginRate >= 20 ? "🟢 우수 (20%+)"
                      : C.marginRate >= 10 ? "🟡 양호 (10~20%)"
                      : C.marginRate >= 0  ? "🟠 주의 (0~10%)"
                      : "🔴 손실"}
                  </div>
                  <div style={{ padding: "4px 12px", borderRadius: 100,
                    background: "#FBFAF6", border: "1px solid #E5DFCF",
                    fontSize: 11, color: "#475569" }}>
                    {ch === "rocket" ? "🚀 로켓그로스" : "🏪 마켓플레이스"} · {CATS[ci].label}
                    {C.promoActive ? ` · 🎁 ${promo === "90" ? "첫90일" : "+270일"}` : ""}
                  </div>
                </div>
              </Card>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                {[
                  { t: "수입원가",         v: C.impTotal,  c: "#3B82F6",
                    s: `매입 ${fmt(C.buyKrw)}원` },
                  { t: "판매/운영비",      v: C.sellTotal, c: "#EE4D2D",
                    s: `수수료 ${fp(C.catFee)}% + 물류비` },
                  { t: "손익분기가 (BEP)", v: C.bepPrice,
                    c: C.SP >= C.bepPrice ? "#4ADE80" : "#F87171",
                    s: C.SP >= C.bepPrice ? "현재 판매가로 달성" : `${fmt(C.bepPrice - C.SP)}원 인상 필요` },
                  { t: `목표 ${fp(nv(tm))}% 최소가`, v: C.minPrice,
                    c: C.SP >= C.minPrice ? "#60A5FA" : "#FB923C",
                    s: C.SP >= C.minPrice ? "현재 판매가로 달성" : `${fmt(C.minPrice - C.SP)}원 인상 필요` },
                ].map((m, i) => (
                  <div key={i} style={{ background: "#FFFFFF", borderRadius: 10,
                    padding: "14px 16px", border: "1px solid " + m.c + "20" }}>
                    <div style={{ fontSize: 10, color: "#475569", marginBottom: 6 }}>{m.t}</div>
                    <div style={{ fontSize: 18, fontFamily: "JetBrains Mono, monospace",
                      color: m.c, fontWeight: 700 }}>{fmt(m.v)}원</div>
                    <div style={{ fontSize: 10, color: "#334155", marginTop: 4 }}>{m.s}</div>
                  </div>
                ))}
              </div>

              <Card>
                <PH>판매가 구성 분석 (100% 스택)</PH>
                <div style={{ display: "flex", height: 30, borderRadius: 6, overflow: "hidden", gap: 1 }}>
                  {BARS.filter(b => C.SP > 0 && b.val > 0).map((b, i) => (
                    <div key={i}
                      title={`${b.label}: ${fmt(b.val)}원 (${fp(b.val / C.SP * 100)}%)`}
                      style={{ background: b.color, height: "100%",
                        width: `${b.val / C.SP * 100}%`,
                        transition: "width .35s ease", flexShrink: 0 }} />
                  ))}
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: "6px 16px", marginTop: 10 }}>
                  {BARS.map((b, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <div style={{ width: 8, height: 8, borderRadius: 2,
                        background: b.color, flexShrink: 0 }} />
                      <span style={{ fontSize: 11, color: "#475569" }}>{b.label}</span>
                      <span style={{ fontSize: 11, fontFamily: "JetBrains Mono, monospace", color: "#8C8472" }}>
                        {C.SP > 0 ? fp(b.val / C.SP * 100) : "0.0"}%
                      </span>
                    </div>
                  ))}
                </div>
              </Card>

              <Card>
                <PH>비용 상세 내역</PH>
                <div style={{ fontSize: 11, color: "#3B82F6", fontWeight: 700, marginBottom: 8 }}>
                  📦 수입원가{simpleMode ? " · 간편비율 적용 중 (관세/부가세/배송비 포함됨)" : ""}
                </div>
                <CostRow label="  · 매입원가 (KRW 환산)" value={C.buyKrw} />
                <CostRow label={`  · 관세 (${cr}%)`}     value={C.customs} />
                <CostRow label="  · 수입부가세 (10%)"     value={C.vatAmt} />
                <CostRow label="  · 포워딩/국제배송비"    value={C.fwAmt} />
                <CostRow label="  · 통관비"              value={C.clAmt} />
                <CostRow label="수입원가 소계" value={C.impTotal} accent="#3B82F6" bold />
                <div style={{ height: 10 }} />
                <div style={{ fontSize: 11, color: "#EE4D2D", fontWeight: 700, marginBottom: 8 }}>
                  🛒 판매/운영비{C.promoActive ? ` · 로켓그로스 ${promo === "90" ? "첫 90일" : "+270일"} 혜택 적용 중` : ""}
                </div>
                <CostRow label={`  · 카테고리 수수료 (${fp(C.catFee)}%)`} value={C.commission} />
                <CostRow label={`  · ${ch === "rocket" ? "로켓그로스 물류비" : "마켓플레이스 배송비"}${promo === "90" ? " (혜택 0원)" : ""}`} value={C.logistic} />
                <CostRow label={`  · 광고비 (${ar}%)`}         value={C.adCost} />
                <CostRow label={`  · 반품비용 (${rr}% × 30%)${C.promoActive ? " (혜택 0원)" : ""}`} value={C.retCost} />
                <CostRow label="판매/운영비 소계" value={C.sellTotal} accent="#EE4D2D" bold />
                <div style={{ height: 8 }} />
                <CostRow label="총 비용" value={C.totalCost} accent="#64748B" bold />
                <div style={{ display: "flex", justifyContent: "space-between",
                  alignItems: "center", padding: "12px 0 4px",
                  borderTop: "1px solid #E5DFCF", marginTop: 8 }}>
                  <span style={{ fontSize: 15, fontWeight: 900, color: "#1E293B" }}>예상 마진</span>
                  <div style={{ textAlign: "right" }}>
                    <span style={{ fontSize: 19, fontWeight: 900,
                      fontFamily: "JetBrains Mono, monospace", color: mc(C.marginRate) }}>
                      {C.margin >= 0 ? "+" : ""}{fmt(C.margin)}원
                    </span>
                    <span style={{ marginLeft: 8, fontSize: 15,
                      fontFamily: "JetBrains Mono, monospace",
                      color: mc(C.marginRate), opacity: 0.75 }}>
                      ({fp(C.marginRate)}%)
                    </span>
                  </div>
                </div>
              </Card>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
